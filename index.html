        // --- COMPOSANT QUIZ (gère un module) ---
        function Quiz({ module, goHome }) {
            const quizData = module.data;
            const colorClass = module.color;
            
            // Tailwind class mappings based on color prop
           const theme = {
                blue: { bg: 'bg-blue-600', hover: 'hover:bg-blue-700', text: 'text-blue-600', light: 'bg-blue-50', border: 'border-blue-600', ring: 'ring-blue-500' },
                emerald: { bg: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-emerald-600', light: 'bg-emerald-50', border: 'border-emerald-600', ring: 'ring-emerald-500' },
                indigo: { bg: 'bg-indigo-600', hover: 'hover:bg-indigo-700', text: 'text-indigo-600', light: 'bg-indigo-50', border: 'border-indigo-600', ring: 'ring-indigo-500' },
                orange: { bg: 'bg-orange-500', hover: 'hover:bg-orange-600', text: 'text-orange-500', light: 'bg-orange-50', border: 'border-orange-500', ring: 'ring-orange-500' },
                rose: { bg: 'bg-rose-500', hover: 'hover:bg-rose-600', text: 'text-rose-500', light: 'bg-rose-50', border: 'border-rose-500', ring: 'ring-rose-500' }
            }[colorClass];

            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);

            const currentQuestion = quizData[currentQuestionIndex];
            const hasAnswered = answers[currentQuestionIndex] !== undefined;

            const handleSelectAnswer = (optionIndex) => {
                if (hasAnswered) return;
                setAnswers(prev => ({ ...prev, [currentQuestionIndex]: optionIndex }));
            };

            const handleNext = () => {
                if (currentQuestionIndex < quizData.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                } else {
                    setShowResults(true);
                }
            };

            const handlePrevious = () => {
                if (currentQuestionIndex > 0) setCurrentQuestionIndex(prev => prev - 1);
            };

            const calculateScore = () => {
                let score = 0;
                Object.keys(answers).forEach(index => {
                    if (answers[index] === quizData[index].a) score++;
                });
                return score;
            };

            const restart = () => {
                setCurrentQuestionIndex(0);
                setAnswers({});
                setShowResults(false);
            };

            if (showResults) {
                const score = calculateScore();
                const percentage = Math.round((score / quizData.length) * 100);

                return (
                    <div className="py-8 px-4 text-slate-800 animate-fade-in w-full max-w-3xl mx-auto">
                        <button onClick={goHome} className="mb-6 inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 font-medium">
                            <IconHome /> Retour au menu
                        </button>
                        
                        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-8 text-center border-t-4 border-${colorClass}-500`}>
                            <h2 className="text-3xl font-bold mb-2">Résultats : {module.title}</h2>
                            <div className={`text-6xl font-black ${theme.text} mb-4`}>{score} / {quizData.length}</div>
                            <p className="text-lg text-slate-600 font-medium mb-8">Score: {percentage}% de bonnes réponses</p>
                            
                            <div className="flex justify-center gap-4 flex-wrap">
                                <button onClick={restart} className="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-lg transition-colors">
                                    <IconRotate /> Recommencer
                                </button>
                                <button onClick={goHome} className="inline-flex items-center gap-2 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-semibold py-3 px-6 rounded-lg transition-colors">
                                    <IconHome /> Changer de module
                                </button>
                            </div>
                        </div>

                        <div className="space-y-6 pb-12">
                            {quizData.map((question, qIndex) => {
                                const userAnswer = answers[qIndex];
                                const isCorrect = userAnswer === question.a;
                                const isUnanswered = userAnswer === undefined;

                                return (
                                    <div key={qIndex} className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                        <h3 className="text-lg font-semibold mb-4 text-slate-800 flex gap-3">
                                            {isCorrect ? <IconCheckCircle className="text-green-500 flex-shrink-0 mt-1" /> : <IconXCircle className="text-red-500 flex-shrink-0 mt-1" />}
                                            <span>{question.q}</span>
                                        </h3>
                                        
                                        <div className="space-y-2 ml-9">
                                            {question.o.map((option, oIndex) => {
                                                let bgC = "bg-slate-50", borderC = "border-slate-200", textC = "text-slate-700";
                                                if (oIndex === question.a) {
                                                    bgC = "bg-green-50"; borderC = "border-green-300"; textC = "text-green-800 font-semibold";
                                                } else if (oIndex === userAnswer && !isCorrect) {
                                                    bgC = "bg-red-50"; borderC = "border-red-300"; textC = "text-red-800";
                                                }

                                                return (
                                                    <div key={oIndex} className={`p-3 rounded-lg border ${bgC} ${borderC} ${textC} flex items-center justify-between`}>
                                                        <span>{option}</span>
                                                        {oIndex === question.a && <IconCheck className="text-green-600" />}
                                                        {oIndex === userAnswer && !isCorrect && <IconX className="text-red-600" />}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {isUnanswered && <p className="text-amber-600 mt-3 ml-9 text-sm font-medium">Question laissée sans réponse.</p>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            const isLastQuestion = currentQuestionIndex === quizData.length - 1;

            return (
                <div className="py-8 px-4 flex flex-col font-sans text-slate-800 max-w-2xl w-full mx-auto animate-fade-in">
                    <button onClick={goHome} className="mb-4 inline-flex items-center gap-2 text-slate-500 hover:text-slate-800 font-medium self-start">
                        <IconHome /> Quitter
                    </button>

                    <div className="mb-6">
                        <div className="flex justify-between items-end mb-2">
                            <span className="text-sm font-semibold text-slate-500 uppercase tracking-wider">
                                Question {currentQuestionIndex + 1} / {quizData.length}
                            </span>
                            <span className="text-sm font-medium text-slate-400">
                                {Object.keys(answers).length} complétées
                            </span>
                        </div>
                        <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                            <div className={`h-full ${theme.bg} transition-all duration-300 ease-out`} style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden mb-6">
                        <div className="p-6 sm:p-8">
                            <h2 className="text-xl sm:text-2xl font-bold text-slate-800 mb-8 leading-snug">
                                {currentQuestion.q}
                            </h2>
                            
                            <div className="space-y-3">
                                {currentQuestion.o.map((option, index) => {
                                    const isSelected = answers[currentQuestionIndex] === index;
                                    const isCorrectAnswer = currentQuestion.a === index;
                                    
                                    let btnStyle = "border-slate-100 bg-white hover:border-slate-300 hover:bg-slate-50 text-slate-700";
                                    let circleStyle = "border-slate-300";
                                    let IconC = null;

                                    if (hasAnswered) {
                                        if (isCorrectAnswer) {
                                            btnStyle = "border-green-500 bg-green-50 text-green-900 shadow-sm ring-1 ring-green-500";
                                            circleStyle = "border-transparent bg-green-500 text-white";
                                            IconC = IconCheck;
                                        } else if (isSelected && !isCorrectAnswer) {
                                            btnStyle = "border-red-500 bg-red-50 text-red-900 shadow-sm ring-1 ring-red-500";
                                            circleStyle = "border-transparent bg-red-500 text-white";
                                            IconC = IconX;
                                        } else {
                                            btnStyle = "border-slate-100 bg-slate-50 text-slate-400 opacity-60";
                                            circleStyle = "border-slate-200";
                                        }
                                    }

                                    return (
                                        <button key={index} onClick={() => handleSelectAnswer(index)} disabled={hasAnswered}
                                            className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ${btnStyle} ${!hasAnswered ? 'cursor-pointer' : 'cursor-default'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${circleStyle}`}>
                                                    {IconC ? <IconC className="w-4 h-4" /> : null}
                                                </div>
                                                <span className="font-medium">{option}</span>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                            
                            {hasAnswered && (
                                <div className={`mt-6 p-4 rounded-lg flex items-start gap-3 ${answers[currentQuestionIndex] === currentQuestion.a ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                    {answers[currentQuestionIndex] === currentQuestion.a ? (
                                        <><IconCheckCircle className="flex-shrink-0 mt-0.5" /> <div><p className="font-bold">Bonne réponse !</p></div></>
                                    ) : (
                                        <><IconXCircle className="flex-shrink-0 mt-0.5" />
                                        <div>
                                            <p className="font-bold">Mauvaise réponse</p>
                                            <p className="text-sm mt-1 opacity-90">La bonne réponse était l'option {String.fromCharCode(65 + currentQuestion.a)}.</p>
                                        </div></>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-between items-center gap-4 pb-12">
                        <button onClick={handlePrevious} disabled={currentQuestionIndex === 0}
                            className={`flex-1 flex justify-center items-center py-4 px-6 rounded-xl font-semibold transition-all ${currentQuestionIndex === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white border border-slate-200 text-slate-700 hover:bg-slate-100 shadow-sm'}`}>
                            <IconChevronLeft /> Précédent
                        </button>
                        
                        <button onClick={handleNext}
                            className={`flex-1 flex justify-center items-center py-4 px-6 rounded-xl font-semibold text-white shadow-md transition-all ${hasAnswered ? theme.bg + ' ' + theme.hover : 'bg-slate-300 hover:bg-slate-400'}`}>
                            {isLastQuestion ? 'Terminer' : 'Suivant'} {!isLastQuestion && <IconChevronRight />}
                        </button>
                    </div>
                </div>
            );
        }

        // --- COMPOSANT PRINCIPAL (App) ---
        function App() {
            const [selectedModule, setSelectedModule] = useState(null);

            if (selectedModule) {
                return <Quiz module={selectedModule} goHome={() => setSelectedModule(null)} />;
            }

            return (
                <div className="min-h-screen p-4 sm:p-8 flex flex-col items-center justify-center">
                    <div className="max-w-4xl w-full">
                        <div className="text-center mb-12">
                            <div className="inline-block p-4 bg-white rounded-2xl shadow-sm mb-4">
                                <IconAward size={48} className="text-slate-800" />
                            </div>
                            <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Révisions Anatomie</h1>
                            <p className="text-lg text-slate-600 max-w-2xl mx-auto">
                                Choisissez un module pour commencer votre entraînement. Tous les QCM sont disponibles hors-ligne avec correction immédiate.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {modulesInfo.map((mod) => (
                                <button key={mod.id} onClick={() => setSelectedModule(mod)}
                                    className="bg-white rounded-2xl p-6 shadow-sm hover:shadow-md border border-slate-200 transition-all text-left flex flex-col group relative overflow-hidden">
                                    <div className={`absolute top-0 left-0 w-2 h-full bg-${mod.color}-500`}></div>
                                    <div className="pl-4">
                                        <div className={`text-${mod.color}-600 font-bold text-sm mb-2 uppercase tracking-wide`}>Module</div>
                                        <h2 className="text-2xl font-bold text-slate-800 mb-2 group-hover:text-slate-900">{mod.title}</h2>
                                        <div className="flex items-center text-slate-500 gap-2 mb-6">
                                            <IconCheckCircle className="w-5 h-5" />
                                            <span>{mod.count} questions QCS</span>
                                        </div>
                                        <div className={`mt-auto inline-flex items-center font-semibold text-${mod.color}-600`}>
                                            Lancer le test <IconChevronRight />
                                        </div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Safe area for newer iPads/iPhones */
        body { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</body>
</html>
